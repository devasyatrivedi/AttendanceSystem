<!DOCTYPE html>
<html lang="en" ng-app="studentApp">
<head>
  <meta charset="UTF-8">
  <title>Student Login</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <style>
    /* Specific overrides to perfectly match the requested white Login form */
    body.auth-container {
        background: #ffffff !important; 
    }
    .auth-card {
        background: #ffffff !important;
        border: none !important;
        border-radius: 12px !important;
        box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1) !important;
        padding: 3.5rem 2.5rem !important;
    }
    .auth-title { 
        color: #111827 !important;
        font-size: 1.5rem !important;
        font-weight: 700 !important;
        margin-bottom: 0.25rem !important;
    }
    .auth-subtitle {
        color: #6b7280 !important;
        font-size: 0.85rem !important;
        margin-bottom: 2rem !important;
    }
    .form-group label {
        color: #6b7280 !important;
        font-size: 0.75rem !important;
        font-weight: 500 !important;
        margin-bottom: 0.25rem !important;
        text-transform: none !important;
        letter-spacing: normal !important;
    }
    
    .form-control.light-input {
        background: #eef2ff !important;
        color: #111827 !important;
        border: none !important;
    }
    .form-control.light-input::placeholder { color: #6b7280 !important; font-size: 0.9rem !important; }
    
    .btn-primary {
        background: #6366f1 !important;
        color: white !important;
        box-shadow: none !important;
        font-weight: 600 !important;
        border-radius: 8px !important;
        padding: 0.75rem 0 !important;
        text-decoration: none !important;
    }
    .btn-primary:hover {
        background: #4f46e5 !important;
    }
    .auth-links a {
        color: #6b7280 !important;
        font-size: 0.85rem !important;
        text-decoration: none !important;
    }
  </style>
</head>
<body class="auth-container">
  
  <div class="auth-card" ng-controller="LoginCtrl" style="max-width: 420px; align-self: center;">
    
    <h2 class="auth-title">Student Login</h2>
    <p class="auth-subtitle">Welcome back! Please login to your account.</p>

    <div class="alert badge-red" style="margin-bottom: 1.5rem; padding: 1rem; width: 100%; border: none;" ng-if="error">{{error}}</div>

    <form ng-submit="login()">
      <div class="form-group">
        <label>Enrollment Number</label>
        <input type="text" ng-model="credentials.enrollment" class="form-control light-input" placeholder="12302110501066" required>
      </div>
      <div class="form-group" style="margin-bottom: 2rem;">
        <label>Password</label>
        <input type="password" ng-model="credentials.password" class="form-control light-input" placeholder="••••••" required>
      </div>
      
      <button type="submit" class="btn btn-primary btn-block" ng-disabled="loading">
        {{loading ? 'Authenticating...' : 'Login'}}
      </button>
    </form>
    
    <div style="margin-top: 2rem; text-align: center;" class="auth-links">
      <a href="../index.html" style="color: #6b7280; font-size: 0.85rem;">&larr; Back to Home</a>
    </div>
  </div>

  <script>
    angular.module('studentApp', [])
    .controller('LoginCtrl', function($scope, $http, $window) {
      $scope.credentials = {};
      $scope.login = function() {
        $scope.loading = true; $scope.error = null;
        $http.post('/api/auth/student/login', $scope.credentials).then(res => {
          $window.localStorage.setItem('studentToken', res.data.data.token);
          $window.location.href = 'dashboard.html';
        }).catch(err => {
          $scope.error = err.data.message || 'Authentication rejected';
        }).finally(() => $scope.loading = false);
      };
    });
  </script>
</body>
</html>
