<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Attendance System</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-container">
  
  <div class="auth-card" style="text-align: center;">
    
    <!-- Central Icon Box matching screenshot exactly -->
    <div style="
        font-size: 3rem; 
        color: #7d84ff; 
        margin: 0 auto 2rem auto; 
        display: inline-flex; 
        padding: 1.5rem; 
        background: rgba(125, 132, 255, 0.1); 
        border-radius: 20px; 
        border: 1px solid rgba(125, 132, 255, 0.2);
    ">
      <i class="fas fa-layer-group"></i>
    </div>
    
    <h2 class="auth-title">Smart Attendance System</h2>
    <p class="auth-subtitle">Select your authorization context</p>
    
    <div style="display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem;">
      <a href="teacher/login.html" class="btn btn-primary btn-block">
        <i class="fas fa-user-shield" style="margin-right: 0.5rem; text-decoration: none;"></i> Administrator Portal
      </a>
      <a href="student/login.html" class="btn btn-outline btn-block">
        <i class="fas fa-user-graduate" style="margin-right: 0.5rem; text-decoration: none;"></i> Student Portal
      </a>
    </div>
    
    <div style="margin-top: 2rem; font-size: 0.9rem; color: #6b7280;">
      New student? <a href="student/register.html" style="color: #6366f1; font-weight: 600; text-decoration: none;">Create an account</a>
    </div>
  </div>

</body>
</html>
